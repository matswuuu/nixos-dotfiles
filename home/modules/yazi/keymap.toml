[[mgr.prepend_keymap]]
on = [ "g", "h" ]
run = "cd ~"
desc = "Cd to home"

[[mgr.prepend_keymap]]
on = [ "g", "d" ]
run = "cd ~/Downloads"
desc = "Cd to downloads"

[[mgr.prepend_keymap]]
on = [ "g", "n" ]
run = "cd ~/nixos-dotfiles"
desc = "Cd to nixos dotfiles"

[[mgr.prepend_keymap]]
on = [ "g", "t" ]
run = "cd ~/.local/share/Trash/files"
desc = "Cd to trash"

[[mgr.prepend_keymap]]
on = [ "g", "m", "1" ]
run = "cd /mnt/data"
desc = "Cd to /mnt/data"

[[mgr.prepend_keymap]]
on = [ "g", "m", "2" ]
run = "cd /mnt/data"
desc = "Cd to /mnt/data2"

[[mgr.prepend_keymap]]
on = [ "<Delete>" ]
run = "remove --force"
desc = "Trash selected files"

[[mgr.prepend_keymap]]
on = "<Space>"
run = "toggle"
desc = "Toggle selected file"

[[mgr.prepend_keymap]]
on = "<C-a>"
run = "toggle_all --state=on"
desc = "Select all files"

[[mgr.prepend_keymap]]
on = "<C-r>"
run = "toggle_all"
desc = "Invert selection"

[[mgr.prepend_keymap]]
on = "v"
run = "visual_mode"
desc = "Enter visual selection mode"

[[mgr.prepend_keymap]]
on = "V"
run = "visual_mode --unset"
desc = "Exit visual selection mode"

[[mgr.prepend_keymap]]
on = "u"
run = "escape --select"
desc = "Clear selection"

[[mgr.prepend_keymap]]
on = "y"
run = "yank"
desc = "Copy selected files"

[[mgr.prepend_keymap]]
on = "<C-c>"
run = "shell -- ~/.config/yazi/copy-files-to-clipboard.sh %h %s"
desc = "Copy selected files to system clipboard"

[[mgr.prepend_keymap]]
on = "x"
run = "yank --cut"
desc = "Cut selected files"

[[mgr.prepend_keymap]]
on = "p"
run = "paste"
desc = "Paste files"

[[mgr.prepend_keymap]]
on = "<C-v>"
run = "paste"
desc = "Paste files"

[[mgr.prepend_keymap]]
on = "r"
run = "rename"
desc = "Rename selected file"

[[mgr.prepend_keymap]]
on = "a"
run = "create"
desc = "Create a file or directory"

[[mgr.prepend_keymap]]
on = "<C-t>"
run = "tab_create --current"
desc = "Create a new tab"

[[mgr.prepend_keymap]]
on = "<C-w>"
run = "close"
desc = "Close the current tab"

[[mgr.prepend_keymap]]
on = "<C-Tab>"
run = "tab_switch 1 --relative"
desc = "Switch to the next tab"

[[mgr.prepend_keymap]]
on = "<C-PageDown>"
run = "tab_switch 1 --relative"
desc = "Switch to the next tab"

[[mgr.prepend_keymap]]
on = "<C-S-Tab>"
run = "tab_switch -1 --relative"
desc = "Switch to the previous tab"

[[mgr.prepend_keymap]]
on = "<C-PageUp>"
run = "tab_switch -1 --relative"
desc = "Switch to the previous tab"

[[mgr.prepend_keymap]]
on = "<C-1>"
run = "tab_switch 0"
desc = "Switch to tab 1"

[[mgr.prepend_keymap]]
on = "<C-2>"
run = "tab_switch 1"
desc = "Switch to tab 2"

[[mgr.prepend_keymap]]
on = "<C-3>"
run = "tab_switch 2"
desc = "Switch to tab 3"

[[mgr.prepend_keymap]]
on = "<C-4>"
run = "tab_switch 3"
desc = "Switch to tab 4"

[[mgr.prepend_keymap]]
on = "<C-5>"
run = "tab_switch 4"
desc = "Switch to tab 5"

[[mgr.prepend_keymap]]
on = "<C-6>"
run = "tab_switch 5"
desc = "Switch to tab 6"

[[mgr.prepend_keymap]]
on = "<C-7>"
run = "tab_switch 6"
desc = "Switch to tab 7"

[[mgr.prepend_keymap]]
on = "<C-8>"
run = "tab_switch 7"
desc = "Switch to tab 8"

[[mgr.prepend_keymap]]
on = "<C-9>"
run = "tab_switch 8"
desc = "Switch to tab 9"
